# ==========================================
# IDMS 智能驾驶员监控系统 - 全局配置
# ==========================================

system:
  camera_id_ext: 2      # 舱外摄像头
  camera_id_int: 0      # 舱内摄像头
  frame_width: 640              # 降低分辨率以提高FPS
  frame_height: 480
  queue_size: 2                 # 队列长度限制为2，丢弃旧帧以保证实时性

# --- 舱内监控 (Internal) ---
internal:
  # ===== 指标阈值（EAR/MAR） =====
  ear_threshold: 0.22           # 眼睛纵横比阈值 (低于此值判定为闭眼)
  mar_threshold: 0.60           # 嘴部纵横比阈值 (高于此值判定为张嘴)

  # ===== FPS / 持续时间（秒）配置 =====
  # - fps=0 表示未知：系统会退化为使用下面的 *frames 阈值。
  fps: 30

  # 以"秒"为单位的持续时间阈值（更直观）。只有当 fps>0 时才会生效。
  drowsy_duration_sec: 1.5      # 闭眼持续超过多少秒算疲劳
  yawn_duration_sec: 2.0        # 张嘴持续超过多少秒算哈欠
  blink_max_sec: 0.30           # 小于该持续时间的闭眼段，算作"眨眼"

  # ===== 备用的"帧数阈值"（fps 未知时用这个） =====
  consecutive_frames_eye: 45    # 闭眼持续帧数报警阈值 (约1.5秒 @30FPS)
  consecutive_frames_mouth: 60  # 哈欠持续帧数阈值 (约2.0秒 @30FPS)
  blink_max_frames: 8           # 眨眼的最大帧数 (约0.27秒 @30FPS)

  # ===== 平滑 =====
  ema_alpha: 0.4                # EAR/MAR 的 EMA 平滑系数（越大越跟随当前帧）

  # ===== MediaPipe FaceMesh 参数 =====
  max_num_faces: 1
  refine_landmarks: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  return_landmarks: true       # 建议默认 false（省性能）；若要画网格点再开

  # ===== 开关（口罩/眼镜/夜间等场景可能需要） =====
  enable_drowsy: true
  # 若驾驶员戴口罩导致嘴部关键点不稳定，可先把 enable_yawn 设为 false
  enable_yawn: true
  enable_head_pose: true        # solvePnP 头部姿态
  enable_attention: true        # 分心/点头逻辑（依赖头部姿态）

  # ===== 分心 / 点头（头部姿态） =====
  # 这些阈值和持续时间需要实测后微调

  # 分心：abs(yaw) 过阈值持续
  distraction_yaw_threshold_deg: 30.0
  distraction_yaw_release_deg: 22.0
  distraction_duration_sec: 0.8
  distraction_frames: 30
  # v3 新增: Grace period（帧数）
  # 解决极端转头时 MediaPipe/PnP 输出 yaw 跳变的问题。
  # 当 yaw 短暂跌落到阈值以下（因为关键点质量下降），最多容忍这么多帧
  # 不清零计数器，从而让大幅转头也能正确触发分心报警。
  distraction_grace_frames: 8

  # 点头/低头：pitch 过阈值持续
  # pitch 的正负号需要用 demo_internal.py 实测确认。
  # 默认假设：低头时 pitch 变小（更负），所以阈值设为 -30。
  # v3 调整: 阈值更严格 (-25 → -30)，持续时间更长 (1.0s → 2.0s)，
  #          避免轻微点头就触发误报。
  nod_pitch_threshold_deg: -30.0
  nod_pitch_release_deg: -18.0
  nod_duration_sec: 2.0
  nod_frames: 60

  pose_ema_alpha: 0.55           # yaw/pitch 的 EMA 平滑系数

    # ===== v4 新增: PERCLOS 配置 =====
  # PERCLOS (Percentage of Eye Closure) 是 FHWA 认定的疲劳检测金标准。
  # 计算方式: 在滑动窗口内，EAR 低于 ear_threshold 的帧占总帧数的比例。
  perclos_window_sec: 60.0        # PERCLOS 统计窗口长度（秒）
  perclos_threshold: 0.15         # PERCLOS 报警阈值 (0.15 = 眼睛闭合超过 15% 的时间)
 
  # ===== v4 新增: 眨眼频率配置 =====
  # 正常人每分钟眨眼 15-20 次，疲劳时升高至 25-30 次。
  blink_freq_window_sec: 60.0    # 眨眼频率统计窗口（秒）
  blink_freq_high_threshold: 25  # 高频眨眼报警阈值（次/分钟）

# --- 舱外监控 (External) ---
external:
  # --- YOLOv8 配置 ---
  model_path: "yolov8n.pt"        # 模型文件 (Nano版, 适合CPU)
  conf_threshold: 0.65             # 置信度阈值
  imgsz: 640                      # 推理输入尺寸 (降低可提速)
  device: "cuda:0"                   # 'cpu' 或 'cuda:0'
  roi_top_ratio: 0.35             # ROI 上边界 (0.35 = 只检测下方65%)

  # --- 距离估算 ---
  focal_length: 600.0             # 焦距常量 F (需校准! 见 calibration_helper)
  known_width: 1.8                # 默认车辆宽度 (米)
  max_distance: 100.0             # 距离上限
  min_distance: 0.5               # 距离下限
  smoothing: 0.3                  # EMA 平滑系数 (0=关闭, 0.3=推荐)
  class_widths:                   # 按类别覆盖宽度
    3: 0.8                        # Motorcycle
    5: 2.5                        # Bus
    7: 2.4                        # Truck

  # --- 碰撞预警 ---
  ttc_threshold: 1.25              # TTC 红色警报阈值 (秒)
  safe_distance_time: 1.75         # 安全跟车时间 (秒)
  match_pixel_base: 80            # 帧间匹配基础像素阈值
  cooldown_sec: 0.0               # 红色警报冷却时间 (秒)

  # --- 横向车道相关性 ---
  lane_center_ratio: 0.5         # 自车道中心在画面中的水平位置 (0.5=正中)
  lane_full_width_ratio: 0.25    # 自车道占画面宽度的比例 (0.30=中间30%为自车道)
  lane_relevance_mode: "soft"    # 'soft'=软衰减(推荐) / 'hard'=硬切
  lateral_speed_threshold: 120.0 # 横向速度阈值(像素/秒)，超过则降级

# --- 界面与报警 (UI) ---
ui:
  show_landmarks: true          # 是否绘制面部网格
  warning_color: [0, 0, 255]    # 红色 (BGR格式)
  normal_color: [0, 255, 0]     # 绿色 (BGR格式)

  # --- 声音报警配置 ---
  alert:
    enable: true
    consecutive_frames: 2       # 连续几帧 DANGER 才报警
    cooldown_sec: 3.0           # 报警后冷却时间（秒），避免重复轰炸
    volume: 0.7                 # 音量 0.0~1.0

  # --- 多模态融合 (Fusion) ---
fusion:
  # 融合权重（三者之和建议 = 1.0）
  w_ext: 0.35               # 舱外碰撞信号权重
  w_int: 0.35               # 舱内驾驶员状态权重
  w_cross: 0.30             # 交叉项权重（核心创新！）
 
  # 风险等级阈值 [LOW, HIGH, CRITICAL]
  level_thresholds: [0.25, 0.50, 0.75]
 
  # 舱外评分映射
  ttc_danger: 1.5            # TTC 低于此值 → ext_score=1.0
  ttc_safe: 6.0              # TTC 高于此值 → ext_score=0.0
  dist_danger: 3.0           # 距离低于此值 → dist_score=1.0
  dist_safe: 30.0            # 距离高于此值 → dist_score=0.0
 
  # 舱内各子指标权重（加起来 = 1.0）
  int_w_drowsy: 0.40         # 疲劳（最严重）
  int_w_yawning: 0.15        # 哈欠
  int_w_distracted: 0.30     # 分心
  int_w_nodding: 0.15        # 点头
 
  # EAR 连续性评分参数（借用 internal 段的值）
  ear_threshold: 0.22
  ear_safe: 0.30
 
  # 融合分值 EMA 平滑
  ema_alpha: 0.4